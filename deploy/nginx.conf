# Nginx конфиг для MTProxy Manager — домен staytg.org
# Скопируйте в /etc/nginx/sites-available/staytg.org
# ln -s /etc/nginx/sites-available/staytg.org /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name staytg.org www.staytg.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staytg.org www.staytg.org;

    ssl_certificate /etc/letsencrypt/live/staytg.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staytg.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Корень фронтенда
    root /var/www/staytg.org;
    index index.html;

    # API — проксируем на Go-бэкенд (порт 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA — для всех остальных маршрутов отдаём index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
